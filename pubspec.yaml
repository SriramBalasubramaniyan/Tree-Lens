name: treelens
description: Carbon Tree Species Classifier — on-device AI for Indian forests
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # TFLite inference
  tflite_flutter: ^0.12.0

  # Camera & image picking
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # Local database for history
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # Permissions
  permission_handler: ^11.3.1

  # UI helpers
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  share_plus: ^9.0.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/data/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
